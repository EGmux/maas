# MAAS VM Provisioning Configuration
maas_provision:
  runcmd:
    - mkdir -p /home/ubuntu/.ssh
    - yes | ssh-keygen -t ed25519 -N "" -f /home/ubuntu/.ssh/id_ed25519
    - cp /home/ubuntu/.ssh/id_ed25519.pub /home/ubuntu/.ssh/authorized_keys
    - chmod 600 /home/ubuntu/.ssh/authorized_keys
    - chmod 700 /home/ubuntu/.ssh
    - chown -R ubuntu:ubuntu /home/ubuntu/.ssh
    - systemctl enable ssh
    - systemctl start ssh
    - systemctl disable --now named || true
    - apt update
    - apt install -y git python3-venv make patch

  clone_maas:
    url: https://github.com/canonical/maas-dev-setup.git
    path: /home/ubuntu/maas-dev-setup
