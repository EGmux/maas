# MAAS VM Provisioning Configuration
maas_provision:
  # Files to copy
  copy:
    - source: /cdrom/ssh_keys
      destination: /root/.ssh/authorized_keys
      permissions: "0600"
      owner: root:root
    
    - source: /cdrom/scripts
      destination: /usr/local/bin/
      permissions: "0755"
      owner: root:root
  
  # Commands to run
  runcmd:
    - ["systemctl", "enable", "ssh"]
    - ["systemctl", "start", "ssh"]
    - ["apt", "update"]
    - ["apt", "install", "-y", "git", "python3-venv"]
  
  # Clone MAAS
  clone_maas:
    url: https://github.com/EGmux/maas.git
    branch: hackingmaas
    path: /home/ubuntu/maas-source
